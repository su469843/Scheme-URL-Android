name: Android Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # 避免标签触发重复构建

env:
  PACKAGE_NAME: 'com.schemeUrl' 

jobs:
  Android:
    name: Android Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86, x86_64]
    
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Restore Gradle dependencies cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: |
          # 检查 gradlew 文件位置
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
            echo "Found gradlew in android directory"
          else
            echo "gradlew not found, attempting to generate it"
            cd android && ./gradlew --version || gradle wrapper --gradle-version=8.5
          fi

      - name: Build Release APK for ${{ matrix.abi }}
        run: |
          cd android
          echo "Building for ${{ matrix.abi }}"
          ./gradlew assembleRelease --stacktrace --info \
            -PKEYSTORE_BASE64='${{ secrets.KEYSTORE_BASE64 }}' \
            -PKEYSTORE_KEY_ALIAS='${{ secrets.KEYSTORE_KEY_ALIAS }}' \
            -PKEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}' \
            -PKEYSTORE_KEY_PASSWORD='${{ secrets.KEYSTORE_KEY_PASSWORD }}' \
            -PABI_FILTER=${{ matrix.abi }}

      - name: Get package version
        run: echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Rename APK with ABI info
        run: |
          cd app/build/outputs/apk/release
          for apk in *.apk; do
            if [[ "$apk" != *"${{ matrix.abi }}"* ]]; then
              new_name="${apk%.apk}-${{ matrix.abi }}.apk"
              mv "$apk" "$new_name"
              echo "Renamed $apk to $new_name"
            fi
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-${{ matrix.abi }}
          path: app/build/outputs/apk/release/*-${{ matrix.abi }}.apk
          retention-days: 5

  Release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [Android]
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Get package version
        run: |
          echo "PACKAGE_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
          echo "PACKAGE_NAME=$(node -p "require('./package.json').name || '$PACKAGE_NAME')" >> $GITHUB_ENV

      - name: Prepare release notes
        run: |
          # 使用Changelog.md或生成基本说明
          if [ -f "log/Changelog.md" ]; then
            echo "使用log/Changelog.md作为发布说明"
            cp log/Changelog.md release_notes.md
          else
            echo "# Release v${{ env.PACKAGE_VERSION }}" > release_notes.md
            echo "" >> release_notes.md
            echo "## Changes" >> release_notes.md
            echo "详情请查看提交历史" >> release_notes.md
          fi
          
          # 添加MD5校验信息
          echo "" >> release_notes.md
          echo "## MD5 Checksums" >> release_notes.md
          echo '```' >> release_notes.md
          cd artifacts
          md5sum *.apk >> ../release_notes.md
          echo '```' >> release_notes.md

      - name: Generate version.json
        run: |
          cd artifacts
          # 创建版本信息JSON
          cat > ../version.json << EOF
          {
            "version": "${{ env.PACKAGE_VERSION }}",
            "versionCode": $(date +%s),
            "releaseDate": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "downloads": {
          EOF
          
          # 为每个APK文件添加下载信息
          first=true
          for apk in *.apk; do
            if [ "$first" = false ]; then
              echo "," >> ../version.json
            fi
            first=false
            
            size=$(stat -c%s "$apk")
            md5=$(md5sum "$apk" | cut -d' ' -f1)
            
            # 提取ABI信息
            if [[ "$apk" == *"arm64-v8a"* ]]; then
              abi="arm64-v8a"
              arch="arm64"
            elif [[ "$apk" == *"armeabi-v7a"* ]]; then
              abi="armeabi-v7a"
              arch="armv7"
            elif [[ "$apk" == *"x86_64"* ]]; then
              abi="x86_64"
              arch="x86_64"
            elif [[ "$apk" == *"x86"* ]]; then
              abi="x86"
              arch="x86"
            else
              abi="universal"
              arch="universal"
            fi
            
            cat >> ../version.json << EOF
              "$arch": {
                "filename": "$apk",
                "size": $size,
                "md5": "$md5",
                "abi": "$abi",
                "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ env.PACKAGE_VERSION }}/$apk"
              }
          EOF
          done
          
          # 结束JSON
          cat >> ../version.json << EOF
            }
          }
          EOF
          
          # 创建log目录并保存version.json
          mkdir -p ../log
          mv ../version.json ../log/version.json
          echo "Generated version.json:"
          cat ../log/version.json

      - name: Upload version.json to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: version-json
          path: log/version.json
          retention-days: 5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          name: Release v${{ env.PACKAGE_VERSION }}
          body_path: release_notes.md
          files: |
            artifacts/*.apk
            log/version.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}