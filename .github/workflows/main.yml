name: React Native Android Build with Release Signing

on:
  push:
    branches: [main]
  workflow_dispatch:

# 全局环境变量
env:
  NODE_VERSION: '20.19.4'
  JAVA_VERSION: '17'
  ANDROID_BUILD_TYPE: 'Release'
  KEYSTORE_FILE: 'release.keystore'  # keystore 文件名

jobs:
  Android:
    name: 🤖 Android Build (Release Signed)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📦 Check out repository
        uses: actions/checkout@v4

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            android/.gradle
          key: ${{ runner.os }}-android-${{ hashFiles('**/package-lock.json', '**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🔧 Setup Gradle permissions
        run: chmod +x android/gradlew

      - name: 🧹 Clean previous builds
        run: |
          cd android
          ./gradlew clean --no-daemon

      - name: 🔐 Decode and Setup Release Keystore
        run: |
          cd android/app
          echo "🔑 Decoding release keystore from base64..."
          
          # 解码 base64 并创建 keystore 文件
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ env.KEYSTORE_FILE }}
          
          # 验证文件是否创建成功
          if [ -f "${{ env.KEYSTORE_FILE }}" ]; then
            echo "✅ Release keystore decoded successfully"
            echo "File size: $(du -h ${{ env.KEYSTORE_FILE }} | cut -f1)"
            echo "Key info:"
            keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep -E "(Alias|Valid|SHA)" || echo "Key info check skipped"
          else
            echo "❌ Failed to decode keystore"
            exit 1
          fi

      - name: 🔧 Configure release signing in gradle.properties
        run: |
          cd android
          # 配置签名信息到 gradle.properties
          echo "RELEASE_STORE_FILE=${{ env.KEYSTORE_FILE }}" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEYSTORE_KEY_ALIAS }}" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEYSTORE_KEY_PASSWORD }}" >> gradle.properties
          
          echo "✅ Signing configuration added to gradle.properties"
          echo "Configuration:"
          grep "RELEASE_" gradle.properties

- name: 🏗️ Build Release APK
  run: |
    cd android
    echo "Building release APK with provided signing config..."
    
    # 显示调试信息（不显示敏感密码）
    echo "Using keystore file: ${{ env.KEYSTORE_FILE }}"
    echo "Using key alias: ${{ secrets.KEYSTORE_KEY_ALIAS }}"
    
    # 执行构建命令
    ./gradlew assembleRelease \
      -PreleaseStoreFile=${{ env.KEYSTORE_FILE }} \
      -PreleaseStorePassword=${{ secrets.KEYSTORE_PASSWORD }} \
      -PreleaseKeyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }} \
      -PreleaseKeyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }} \
      --no-daemon \
      --info
      
    # 检查构建结果
    if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
      echo "✅ Build successful!"
      ls -la app/build/outputs/apk/release/
    else
      echo "❌ Build failed!"
      exit 1
    fi

      - name: 🧹 Cleanup keystore file
        run: |
          cd android/app
          rm -f ${{ env.KEYSTORE_FILE }}
          echo "✅ Keystore file cleaned up"

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "Current version: $PACKAGE_VERSION"

      - name: 📦 Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apks
          path: |
            android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: 📝 Build summary
        run: |
          echo "### 🤖 Android Build Successful (Release Signed)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ env.PACKAGE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** ${{ env.ANDROID_BUILD_TYPE }} with Release Signature" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ℹ️ Note:** APKs are signed with release certificate." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated APKs:**" >> $GITHUB_STEP_SUMMARY
          cd android/app/build/outputs/apk/release
          for apk in *.apk; do
            if [ -f "$apk" ]; then
              SIZE=$(du -h "$apk" | cut -f1)
              echo "- \`$apk\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
            fi
          done

  Release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: [Android]
    if: success()

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release-apks
          path: ./artifacts

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: 🔍 Generate MD5 checksums
        run: |
          echo "### 📦 File Integrity Checksums" > ./release-info.md
          echo "\`\`\`" >> ./release-info.md
          cd artifacts
          md5sum *.apk >> ../release-info.md
          echo "\`\`\`" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 📝 Release Information" >> ./release-info.md
          echo "These APKs are signed with **release certificate**." >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 🚀 Release Notes" >> ./release-info.md
          echo "Automated release build - $(date +'%Y-%m-%d')" >> ./release-info.md

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ./release-info.md
          prerelease: false
          draft: false
          tag_name: v${{ env.PACKAGE_VERSION }}
          files: |
            artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
