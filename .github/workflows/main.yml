name: React Native Android Build with Temporary Signing

on:
  push:
    branches: [main]
  workflow_dispatch:

# 全局环境变量
env:
  NODE_VERSION: '20.19.4'
  JAVA_VERSION: '17'
  ANDROID_BUILD_TYPE: 'Release'
  KEYSTORE_FILE: 'temporary.keystore'
  KEY_ALGORITHM: 'RSA'
  KEY_SIZE: '2048'
  KEY_VALIDITY: '10000'
  KEY_DNAME: 'CN=Temp, OU=Temp, O=Temp, L=Temp, S=Temp, C=Temp'

jobs:
  Android:
    name: 🤖 Android Build (Temporary Signed)
    runs-on: ubuntu-latest
    # 超时时间使用硬编码值，因为timeout-minutes不支持env上下文
    timeout-minutes: 45

    # 作业级别的环境变量
    env:
      GRADLE_BUILD_TIMEOUT: 30
      KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'androidkey' }}

    steps:
      - name: 📦 Check out repository
        uses: actions/checkout@v4

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            android/.gradle
          key: ${{ runner.os }}-android-${{ hashFiles('**/package-lock.json', '**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🔧 Setup Gradle permissions
        run: chmod +x android/gradlew

      - name: 🧹 Clean previous builds
        run: |
          cd android
          ./gradlew clean --no-daemon

      - name: 🔐 Generate Temporary Signing Key
        run: |
          cd android
          echo "🔑 Generating temporary signing key..."
          
          # 生成临时签名密钥
          keytool -genkeypair \
            -v \
            -keystore ${{ env.KEYSTORE_FILE }} \
            -alias ${{ env.KEY_ALIAS }} \
            -keyalg ${{ env.KEY_ALGORITHM }} \
            -keysize ${{ env.KEY_SIZE }} \
            -validity ${{ env.KEY_VALIDITY }} \
            -dname "${{ env.KEY_DNAME }}" \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD || secrets.KEYSTORE_PASSWORD }}
          
          # 验证密钥生成成功
          if [ -f "${{ env.KEYSTORE_FILE }}" ]; then
            echo "✅ Temporary keystore generated successfully"
            echo "Key info:"
            keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep -E "(Alias|Valid|SHA)"
          else
            echo "❌ Failed to generate keystore"
            exit 1
          fi

      - name: 🔧 Configure release signing
        run: |
          cd android
          # 创建 gradle.properties 文件或追加签名配置
          echo "RELEASE_STORE_FILE=${{ env.KEYSTORE_FILE }}" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ env.KEY_ALIAS }}" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD || secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
          echo "✅ Signing configuration added to gradle.properties"

      - name: 🏗️ Build with Temporary Signature
        run: |
          cd android
          echo "🏗️ Building ${{ env.ANDROID_BUILD_TYPE }} APK with temporary signature..."
          
          # 使用正确的签名配置构建
          ./gradlew assemble${{ env.ANDROID_BUILD_TYPE }} \
            -PreleaseStoreFile=${{ env.KEYSTORE_FILE }} \
            -PreleaseStorePassword=${{ secrets.KEYSTORE_PASSWORD }} \
            -PreleaseKeyAlias=${{ env.KEY_ALIAS }} \
            -PreleaseKeyPassword=${{ secrets.KEY_PASSWORD || secrets.KEYSTORE_PASSWORD }}
        # 使用作业级别的环境变量
        timeout-minutes: ${{ env.GRADLE_BUILD_TIMEOUT }}

      - name: 🧹 Cleanup temporary key
        run: |
          cd android
          rm -f ${{ env.KEYSTORE_FILE }}
          echo "✅ Temporary keystore cleaned up"

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "Current version: $PACKAGE_VERSION"

      - name: 🏷️ Create git tag
        uses: pkgdeps/git-tag-action@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repo: ${{ github.repository }}
          version: ${{ env.PACKAGE_VERSION }}
          git_tag_prefix: "v"

      - name: 📦 Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ env.ANDROID_BUILD_TYPE }}-apks
          path: |
            android/app/build/outputs/apk/${{ env.ANDROID_BUILD_TYPE }}/*.apk
          retention-days: 7

      - name: 📝 Build summary
        run: |
          echo "### 🤖 Android Build Successful (Temporary Signed)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ env.PACKAGE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** ${{ env.ANDROID_BUILD_TYPE }} with Temporary Signature" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ℹ️ Note:** APKs are signed with a temporary certificate for testing purposes." >> $GITHUB_STEP_SUMMARY
          echo "These APKs can be installed normally on Android devices." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated APKs:**" >> $GITHUB_STEP_SUMMARY
          cd android/app/build/outputs/apk/${{ env.ANDROID_BUILD_TYPE }}
          for apk in *.apk; do
            if [ -f "$apk" ]; then
              SIZE=$(du -h "$apk" | cut -f1)
              echo "- \`$apk\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
            fi
          done

  Release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: [Android]
    if: success()

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-${{ env.ANDROID_BUILD_TYPE }}-apks
          path: ./artifacts

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: 🔍 Generate MD5 checksums
        run: |
          echo "### 📦 File Integrity Checksums" > ./release-info.md
          echo "\`\`\`" >> ./release-info.md
          cd artifacts
          md5sum *.apk >> ../release-info.md
          echo "\`\`\`" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 📝 Installation Note" >> ./release-info.md
          echo "These APKs are signed with a **temporary certificate** for testing purposes." >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 🔑 Signature Information" >> ./release-info.md
          echo "- **Certificate Type:** Temporary (for testing)" >> ./release-info.md
          echo "- **Validity:** ${{ env.KEY_VALIDITY }} days" >> ./release-info.md
          echo "- **Algorithm:** ${{ env.KEY_ALGORITHM }}-${{ env.KEY_SIZE }}" >> ./release-info.md
          echo "- **Note:** For production release, use official signing certificates" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 🚀 Release Notes" >> ./release-info.md
          echo "Automated build with temporary signing - $(date +'%Y-%m-%d')" >> ./release-info.md

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ./release-info.md
          prerelease: false
          draft: false
          tag_name: v${{ env.PACKAGE_VERSION }}
          files: |
            artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
