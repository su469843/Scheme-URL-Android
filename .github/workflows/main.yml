name: Test Build - Debug

on:
  push:
    branches: [ develop, test/*, feature/* ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  debug-build:
    name: 🧪 Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 检查项目结构
        run: |
          echo "📁 当前目录结构:"
          ls -la
          echo ""
          echo "📁 android 目录结构:"
          ls -la android/ || echo "没有 android 目录"
          echo ""
          echo "📁 检查 gradlew 文件位置:"
          find . -name "gradlew" -type f 2>/dev/null || echo "未找到 gradlew 文件"

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            android/.gradle
          key: ${{ runner.os }}-debug-${{ hashFiles('**/package-lock.json', '**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-debug-

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: 🔧 设置 Gradle 执行权限（正确路径）
        run: |
          # 检查 gradlew 文件的实际位置
          if [ -f "android/gradlew" ]; then
            echo "✅ 在 android/gradlew 找到 gradlew 文件"
            chmod +x android/gradlew
          elif [ -f "./gradlew" ]; then
            echo "✅ 在 ./gradlew 找到 gradlew 文件"
            chmod +x ./gradlew
          else
            echo "❌ 错误：未找到 gradlew 文件"
            echo "正在尝试生成 gradlew..."
            cd android && ./gradlew --version || cd android && gradle wrapper
            chmod +x android/gradlew
          fi

      - name: 🏗️ Build Debug APK
        run: |
          # 在 android 目录中执行构建
          cd android
          ./gradlew assembleDebug --stacktrace --no-daemon --warning-mode=none

      - name: 📋 验证生成的APK
        run: |
          echo "📦 检查生成的APK文件:"
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          
          if [ -f "$APK_PATH" ]; then
            echo "✅ 找到 app-debug.apk"
            echo "📊 文件大小: $(du -h "$APK_PATH" | cut -f1)"
            ls -la "$APK_PATH"
          else
            echo "❌ 错误: 未找到 app-debug.apk"
            echo "搜索所有APK文件:"
            find . -name "*.apk" -type f 2>/dev/null || echo "未找到任何APK文件"
            exit 1
          fi

      - name: ⬆️ Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 3
          if-no-files-found: error

      - name: 📝 构建报告
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          else
            APK_SIZE="未知"
          fi
          
          echo "### 🧪 测试构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**构建状态:** ✅ 成功" >> $GITHUB_STEP_SUMMARY
          echo "**构建类型:** Debug (未签名)" >> $GITHUB_STEP_SUMMARY
          echo "**文件大小:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "**构建时间:** $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY