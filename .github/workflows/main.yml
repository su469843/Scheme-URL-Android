name: React Native Android CI/CD

on:
  push:
    branches: [main, develop, test/*, feature/*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20.19.4'  # 指定Node版本，避免版本兼容性问题
  JAVA_VERSION: '17'       # 指定Java版本

jobs:
  android-build:
    name: 🤖 Android构建 (Debug & Release)
    runs-on: ubuntu-latest
    timeout-minutes: 45     # 适当延长超时时间，避免构建被取消

    strategy:
      matrix:
        build-type: [debug, release]  # 矩阵构建，同时生成Debug和Release包

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: ⎔ 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ 设置JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 设置Android SDK
        uses: android-actions/setup-android@v2
        # 通常不需要手动设置ANDROID_HOME，该Action会处理

      - name: 💾 缓存Node模块和Gradle缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            android/.gradle
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 📦 安装依赖
        run: npm ci --prefer-offline  # 使用ci命令确保依赖一致性

      - name: 🔧 设置Gradle执行权限
        run: chmod +x android/gradlew

      - name: 🧹 清理Gradle构建缓存
        run: |
          cd android
          ./gradlew clean --no-daemon

      - name: 🏗️ 构建APK - ${{ matrix.build-type }}
        run: |
          cd android
          # 增加Gradle堆内存，添加堆栈跟踪和详细日志
          ./gradlew assemble${{ matrix.build-type }} --no-daemon --warning-mode=none --stacktrace -Dorg.gradle.jvmargs="-Xmx4g"
        timeout-minutes: 30  # 为构建步骤单独设置超时

      - name: ✅ 验证APK完整性
        run: |
          APK_PATH="android/app/build/outputs/apk/${{ matrix.build-type }}/app-${{ matrix.build-type }}.apk"
          
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK文件未找到: $APK_PATH"
            echo "搜索所有APK文件:"
            find android/app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "未找到任何APK文件"
            exit 1
          fi

          echo "✅ APK文件存在: $APK_PATH"
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "📊 文件大小: $APK_SIZE"

          # 检查是否为有效的ZIP/APK文件
          if file "$APK_PATH" | grep -q "Zip archive"; then
            echo "✅ APK文件格式正确 (ZIP归档)"
          else
            echo "❌ APK文件格式异常"
            echo "文件类型信息: $(file "$APK_PATH")"
            exit 1
          fi

          # 尝试验证ZIP结构
          if unzip -t "$APK_PATH" > /dev/null 2>&1; then
            echo "✅ APK ZIP结构完整"
          else
            echo "❌ APK ZIP结构损坏或无效"
            exit 1
          fi

          # 检查是否包含AndroidManifest.xml
          if unzip -l "$APK_PATH" | head -20 | grep -q "AndroidManifest.xml"; then
            echo "✅ 包含AndroidManifest.xml"
          else
            echo "❌ 缺少AndroidManifest.xml"
            exit 1
          fi

      - name: ⬆️ 上传APK产物
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.build-type }}-apk
          path: android/app/build/outputs/apk/${{ matrix.build-type }}/app-${{ matrix.build-type }}.apk
          retention-days: 7

      - name: 📝 生成构建报告
        if: always()  # 无论构建成功失败都生成报告
        run: |
          echo "### 🤖 Android ${{ matrix.build-type }} 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**状态:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**构建类型:** ${{ matrix.build-type }}" >> $GITHUB_STEP_SUMMARY
          echo "**构建时间:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          
          APK_PATH="android/app/build/outputs/apk/${{ matrix.build-type }}/app-${{ matrix.build-type }}.apk"
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "**文件大小:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
            echo "**下载:** [点击下载](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "**构建失败:** 未生成APK文件" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY