name: React Native Android Build with Temporary Signing

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_VERSION: '20.19.4'
  JAVA_VERSION: '17'
  KEYSTORE_PASSWORD: 'android'  # 临时密钥密码
  KEY_ALIAS: 'androidkey'       # 临时密钥别名

jobs:
  Android:
    name: 🤖 Android Build (Temporary Signed)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📦 Check out repository
        uses: actions/checkout@v4

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            android/.gradle
          key: ${{ runner.os }}-android-${{ hashFiles('**/package-lock.json', '**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🔧 Setup Gradle permissions
        run: chmod +x android/gradlew

      - name: 🧹 Clean previous builds
        run: |
          cd android
          ./gradlew clean --no-daemon

      - name: 🔐 Generate Temporary Signing Key
        run: |
          cd android
          echo "🔑 Generating temporary signing key..."
          
          # 生成临时签名密钥（有效期为10000天）
          keytool -genkeypair \
            -v \
            -keystore temporary.keystore \
            -alias ${{ env.KEY_ALIAS }} \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Temp, OU=Temp, O=Temp, L=Temp, S=Temp, C=Temp" \
            -storepass ${{ env.KEYSTORE_PASSWORD }} \
            -keypass ${{ env.KEYSTORE_PASSWORD }}
          
          # 验证密钥生成成功
          if [ -f "temporary.keystore" ]; then
            echo "✅ Temporary keystore generated successfully"
            echo "Key info:"
            keytool -list -v -keystore temporary.keystore -storepass ${{ env.KEYSTORE_PASSWORD }} | grep -E "(Alias|Valid|SHA)"
          else
            echo "❌ Failed to generate keystore"
            exit 1
          fi

      - name: 🏗️ Build with Temporary Signature
        run: |
          cd android
          echo "🏗️ Building release APK with temporary signature..."
          
          ./gradlew assembleRelease
        timeout-minutes: 30

      - name: ✅ Verify APK signature
        run: |
          cd android/app/build/outputs/apk/release
          echo "🔍 Verifying APK signatures..."
          
          for apk in *.apk; do
            if [ -f "$apk" ]; then
              echo "📦 Checking signature for: $apk"
              
              # 验证APK签名
              if apksigner verify --verbose "$apk" 2>/dev/null | grep -q "Verified using v1 scheme (JAR signing)"; then
                echo "✅ APK is properly signed (v1 scheme)"
              elif apksigner verify --verbose "$apk" 2>/dev/null | grep -q "Verified using v2 scheme (APK Signature Scheme v2)"; then
                echo "✅ APK is properly signed (v2 scheme)"
              elif apksigner verify --verbose "$apk" 2>/dev/null | grep -q "Verified using v3 scheme (APK Signature Scheme v3)"; then
                echo "✅ APK is properly signed (v3 scheme)"
              else
                echo "❌ APK is not properly signed or verification failed"
                echo "Trying alternative verification method..."
                
                # 备用验证方法
                if unzip -l "$apk" | grep -q "META-INF/.*\.RSA\|META-INF/.*\.DSA\|META-INF/.*\.EC"; then
                  echo "✅ APK contains signature files (META-INF/)"
                else
                  echo "❌ APK missing signature files"
                  exit 1
                fi
              fi
              
              # 检查文件基本信息
              echo "📊 File size: $(du -h "$apk" | cut -f1)"
              echo "---"
            fi
          done

      - name: 🧹 Cleanup temporary key
        run: |
          cd android
          rm -f temporary.keystore
          echo "✅ Temporary keystore cleaned up"

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "Current version: $PACKAGE_VERSION"

      - name: 🏷️ Create git tag
        uses: pkgdeps/git-tag-action@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repo: ${{ github.repository }}
          version: ${{ env.PACKAGE_VERSION }}
          git_commit_sha: ${{ github.sha }}
          git_tag_prefix: "v"

      - name: 📦 Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-signed-apks
          path: |
            android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: 📝 Build summary
        run: |
          echo "### 🤖 Android Build Successful (Temporary Signed)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ env.PACKAGE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** Release with Temporary Signature" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ℹ️ Note:** APKs are signed with a temporary certificate for testing purposes." >> $GITHUB_STEP_SUMMARY
          echo "These APKs can be installed normally on Android devices." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated APKs:**" >> $GITHUB_STEP_SUMMARY
          cd android/app/build/outputs/apk/release
          for apk in *.apk; do
            if [ -f "$apk" ]; then
              SIZE=$(du -h "$apk" | cut -f1)
              echo "- \`$apk\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
            fi
          done

  Release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: [Android]
    if: success()

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-signed-apks
          path: ./artifacts

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: 🔍 Generate MD5 checksums
        run: |
          echo "### 📦 File Integrity Checksums" > ./release-info.md
          echo "\`\`\`" >> ./release-info.md
          cd artifacts
          md5sum *.apk >> ../release-info.md
          echo "\`\`\`" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 📝 Installation Note" >> ./release-info.md
          echo "These APKs are signed with a **temporary certificate** for testing purposes." >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 🔑 Signature Information" >> ./release-info.md
          echo "- **Certificate Type:** Temporary (for testing)" >> ./release-info.md
          echo "- **Validity:** 10000 days" >> ./release-info.md
          echo "- **Note:** For production release, use official signing certificates" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 🚀 Release Notes" >> ./release-info.md
          echo "Automated build with temporary signing - $(date +'%Y-%m-%d')" >> ./release-info.md

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ./release-info.md
          prerelease: false
          draft: false
          tag_name: v${{ env.PACKAGE_VERSION }}
          files: |
            artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}