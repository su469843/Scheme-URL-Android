name: React Native CI/CD Pipeline

on:
  push:
    branches: [main, develop, test/*, feature/*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20.19.4'
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.7'

jobs:
  # 代码质量检查工作流
  lint-and-test:
    name: 🔍 代码检查和测试
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: ⎔ 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 💾 缓存Node模块
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            android/.gradle
            android/app/build
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 📦 安装依赖
        run: npm ci --prefer-offline

      - name: 🔍 运行ESLint检查
        run: npm run lint || echo "Lint检查失败，但继续执行"

      - name: 🧪 运行单元测试
        run: npm test -- --passWithNoTests --coverage

      - name: 📊 上传测试覆盖率
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  # Android构建工作流
  android-build:
    name: 🤖 Android构建
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 30
    
    strategy:
      matrix:
        build-type: [debug, release]

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: ⎔ 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ 设置JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 设置Android SDK
        uses: android-actions/setup-android@v2

      - name: 💾 恢复缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            android/.gradle
            android/app/build
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 📦 安装依赖
        run: npm ci --prefer-offline

      - name: 🔧 设置Gradle权限
        run: chmod +x android/gradlew

      - name: 🏗️ 构建APK - ${{ matrix.build-type }}
        run: |
          cd android
          ./gradlew assemble${{ matrix.build-type }} --no-daemon --warning-mode=none --stacktrace

      - name: 🔍 验证APK文件
        run: |
          APK_PATH="android/app/build/outputs/apk/${{ matrix.build-type }}/app-${{ matrix.build-type }}.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK构建成功: $APK_PATH"
            echo "文件大小: $(du -h "$APK_PATH" | cut -f1)"
            # 基本APK验证
            if file "$APK_PATH" | grep -q "Zip archive"; then
              echo "✅ APK文件格式正确"
            else
              echo "❌ APK文件格式异常"
              exit 1
            fi
          else
            echo "❌ 未找到APK文件"
            find android/app/build/outputs -name "*.apk" | head -5
            exit 1
          fi

      - name: ⬆️ 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.build-type }}-apk
          path: android/app/build/outputs/apk/${{ matrix.build-type }}/app-${{ matrix.build-type }}.apk
          retention-days: 7

      - name: 📝 生成构建报告
        if: always()
        run: |
          echo "### 🤖 Android ${{ matrix.build-type }}构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**状态:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**构建类型:** ${{ matrix.build-type }}" >> $GITHUB_STEP_SUMMARY
          echo "**构建时间:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          
          APK_PATH="android/app/build/outputs/apk/${{ matrix.build-type }}/app-${{ matrix.build-type }}.apk"
          if [ -f "$APK_PATH" ]; then
            echo "**文件大小:** $(du -h "$APK_PATH" | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "**下载:** [点击下载](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "**构建失败:** 未生成APK文件" >> $GITHUB_STEP_SUMMARY
          fi

  # 安全扫描工作流
  security-scan:
    name: 🔒 安全扫描
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 15

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: ⎔ 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔍 运行npm审计
        run: npm audit --audit-level moderate || true

      - name: 🔒 检查已知漏洞
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # 部署工作流（可根据需要启用）
