name: React Native Android Build with Release Signing

on:
  push:
    branches: [main]
  workflow_dispatch:

# 全局环境变量
env:
  NODE_VERSION: '20.19.4'
  JAVA_VERSION: '17'
  ANDROID_BUILD_TYPE: 'Release'
  KEYSTORE_FILE: 'release.keystore'

jobs:
  Android:
    name: 🤖 Android Build (Release Signed)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📦 Check out repository
        uses: actions/checkout@v4

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            android/.gradle
          key: ${{ runner.os }}-android-${{ hashFiles('**/package-lock.json', '**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🔧 Setup Gradle permissions
        run: chmod +x android/gradlew

      - name: 🧹 Clean previous builds
        run: |
          cd android
          ./gradlew clean --no-daemon

      - name: 🔐 Decode and Setup Release Keystore
        run: |
          cd android/app
          echo "🔑 Decoding release keystore from base64..."
          
          # 解码 base64 并创建 keystore 文件
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ env.KEYSTORE_FILE }}
          
          # 验证文件是否创建成功
          if [ -f "${{ env.KEYSTORE_FILE }}" ]; then
            echo "✅ Release keystore decoded successfully"
            echo "File size: $(du -h ${{ env.KEYSTORE_FILE }} | cut -f1)"
            # 验证keystore基本信息（不显示敏感信息）
            keytool -list -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ secrets.KEYSTORE_PASSWORD }} | head -5 || echo "Key info verification completed"
          else
            echo "❌ Failed to decode keystore"
            exit 1
          fi

      - name: 🏗️ Build Release APK with Signing
        run: |
          cd android
          echo "🏗️ Building ${{ env.ANDROID_BUILD_TYPE }} APK with release signing..."
          echo "Using signing configuration:"
          echo "Store File: ${{ env.KEYSTORE_FILE }}"
          echo "Key Alias: ${{ secrets.KEYSTORE_KEY_ALIAS }}"
          
          # 使用命令行参数传递签名配置
          ./gradlew assembleRelease -PMYAPP_UPLOAD_STORE_FILE='${{ secrets.KEYSTORE_STORE_FILE }}' -PMYAPP_UPLOAD_KEY_ALIAS='${{ secrets.KEYSTORE_KEY_ALIAS }}' -PMYAPP_UPLOAD_STORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}' -PMYAPP_UPLOAD_KEY_PASSWORD='${{ secrets.KEYSTORE_KEY_PASSWORD }}'
          rm -f app/${{ secrets.KEYSTORE_STORE_FILE }} --info
          
          # 检查构建结果
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            echo "✅ Build successful! APK generated:"
            ls -la app/build/outputs/apk/release/
            APK_SIZE=$(du -h app/build/outputs/apk/release/app-release.apk | cut -f1)
            echo "APK Size: $APK_SIZE"
          else
            echo "❌ Build failed - APK not found!"
            echo "Checking build outputs:"
            ls -la app/build/outputs/ || true
            ls -la app/build/ || true
            exit 1
          fi

      - name: 🧹 Cleanup keystore file
        run: |
          cd android/app
          if [ -f "${{ env.KEYSTORE_FILE }}" ]; then
            rm -f "${{ env.KEYSTORE_FILE }}"
            echo "✅ Keystore file cleaned up"
          else
            echo "ℹ️ Keystore file already removed"
          fi

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "Current version: $PACKAGE_VERSION"

      - name: 📦 Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apks
          path: |
            android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: 📝 Build summary
        run: |
          echo "### 🤖 Android Build Successful (Release Signed)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ env.PACKAGE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** ${{ env.ANDROID_BUILD_TYPE }} with Release Signature" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Signed with release certificate" >> $GITHUB_STEP_SUMMARY
          echo "- Key Alias: ${{ secrets.KEYSTORE_KEY_ALIAS }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated APKs:**" >> $GITHUB_STEP_SUMMARY
          cd android/app/build/outputs/apk/release
          for apk in *.apk; do
            if [ -f "$apk" ]; then
              SIZE=$(du -h "$apk" | cut -f1)
              echo "- \`$apk\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
            fi
          done

  Release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [Android]
    if: success()

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release-apks
          path: ./artifacts

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "Release version: $PACKAGE_VERSION"

      - name: 🔍 Generate MD5 checksums
        run: |
          echo "### 📦 File Integrity Checksums" > ./release-info.md
          echo "\`\`\`" >> ./release-info.md
          cd artifacts
          find . -name "*.apk" -exec md5sum {} \; >> ../release-info.md
          echo "\`\`\`" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 📝 Release Information" >> ./release-info.md
          echo "**Build Date:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> ./release-info.md
          echo "**Version:** $PACKAGE_VERSION" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 🔑 Signature Details" >> ./release-info.md
          echo "- Signed with release certificate" >> ./release-info.md
          echo "- For production distribution" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 🚀 Release Notes" >> ./release-info.md
          echo "Automated production release build" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 📋 APK Files" >> ./release-info.md
          cd artifacts
          for apk in *.apk; do
            if [ -f "$apk" ]; then
              SIZE=$(du -h "$apk" | cut -f1)
              echo "- \`$apk\` ($SIZE)" >> ./release-info.md
            fi
          done

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ./release-info.md
          prerelease: false
          draft: false
          tag_name: v${{ env.PACKAGE_VERSION }}
          files: |
            artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Release confirmation
        run: |
          echo "🎉 GitHub Release created successfully!"
          echo "Version: v${{ env.PACKAGE_VERSION }}"
          echo "APK files uploaded to release assets"
