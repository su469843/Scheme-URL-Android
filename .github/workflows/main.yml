name: React Native Android Build (No Signing)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_VERSION: '20.19.4'
  JAVA_VERSION: '17'

jobs:
  Android:
    name: 🤖 Android Build (Unsigned)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📦 Check out repository
        uses: actions/checkout@v4

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            android/.gradle
          key: ${{ runner.os }}-android-${{ hashFiles('**/package-lock.json', '**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🔧 Setup Gradle permissions
        run: chmod +x android/gradlew

      - name: 🧹 Clean previous builds
        run: |
          cd android
          ./gradlew clean --no-daemon

      - name: 🏗️ Build Unsigned Release APK
        run: |
          cd android
          # 构建未签名的release版本
          ./gradlew assembleRelease -x signReleaseBundle --no-daemon --warning-mode=none --stacktrace
        timeout-minutes: 30

      - name: ✅ Verify APK integrity
        run: |
          cd android/app/build/outputs/apk/release
          echo "🔍 Verifying APK files..."
          
          for apk in *.apk; do
            if [ -f "$apk" ]; then
              echo "📦 Checking $apk"
              echo "Size: $(du -h "$apk" | cut -f1)"
              
              # 检查是否为有效的ZIP/APK文件
              if file "$apk" | grep -q "Zip archive"; then
                echo "✅ Valid APK format"
                
                # 检查基本APK结构
                if unzip -l "$apk" | head -10 | grep -q "AndroidManifest.xml"; then
                  echo "✅ Contains AndroidManifest.xml"
                else
                  echo "❌ Missing AndroidManifest.xml"
                  exit 1
                fi
                
              else
                echo "❌ Invalid APK format: $(file "$apk")"
                exit 1
              fi
              echo "---"
            fi
          done

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "Current version: $PACKAGE_VERSION"

      - name: 🏷️ Create git tag
        uses: pkgdeps/git-tag-action@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repo: ${{ github.repository }}
          version: ${{ env.PACKAGE_VERSION }}
          git_commit_sha: ${{ github.sha }}
          git_tag_prefix: "v"

      - name: 📦 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-unsigned-apks
          path: |
            android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: 📝 Build summary
        run: |
          echo "### 🤖 Android Build Successful (Unsigned)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ env.PACKAGE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** Unsigned Release" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**⚠️ Note:** These APKs are unsigned and may require enabling 'Unknown sources' to install on devices." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated APKs:**" >> $GITHUB_STEP_SUMMARY
          cd android/app/build/outputs/apk/release
          for apk in *.apk; do
            if [ -f "$apk" ]; then
              SIZE=$(du -h "$apk" | cut -f1)
              echo "- \`$apk\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
            fi
          done

  Release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: [Android]
    if: success()

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-unsigned-apks
          path: ./artifacts

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: 🔍 Generate MD5 checksums
        run: |
          echo "### 📦 File Integrity Checksums" > ./release-info.md
          echo "\`\`\`" >> ./release-info.md
          cd artifacts
          md5sum *.apk >> ../release-info.md
          echo "\`\`\`" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 📝 Installation Note" >> ./release-info.md
          echo "These APKs are **unsigned**. To install on Android devices:" >> ./release-info.md
          echo "1. Enable **Install unknown apps** in settings" >> ./release-info.md
          echo "2. Allow installation from your file manager/browser" >> ./release-info.md
          echo "3. Install the APK as usual" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 🚀 Release Notes" >> ./release-info.md
          echo "Automated build from GitHub Actions - $(date +'%Y-%m-%d')" >> ./release-info.md

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ./release-info.md
          prerelease: false
          draft: false
          tag_name: v${{ env.PACKAGE_VERSION }}
          files: |
            artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}