name: Test Build - Debug

on:
  push:
    branches: [ develop, test/*, feature/* ]  # 开发相关分支触发
  pull_request:
    branches: [ develop, main ]               # 针对主要分支的PR
  workflow_dispatch:                          # 手动触发
  schedule:
    - cron: '0 18 * * 1-5'  # 工作日晚上6点自动构建（可选）

jobs:
  debug-build:
    name: 🧪 Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 设置超时时间

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            android/.gradle
          key: ${{ runner.os }}-debug-${{ hashFiles('**/package-lock.json', '**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-debug-

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: 🔧 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🏗️ Build Debug APK (仅通用版本)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace --no-daemon --warning-mode=none
        env:
          CI: true  # 设置为CI环境，避免一些交互提示

      - name: 📋 验证生成的APK
        run: |
          echo "📦 检查生成的APK文件:"
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          
          if [ -f "$APK_PATH" ]; then
            echo "✅ 找到 app-debug.apk"
            echo "📊 文件大小: $(du -h "$APK_PATH" | cut -f1)"
            echo "📁 文件路径: $APK_PATH"
          else
            echo "❌ 错误: 未找到 app-debug.apk"
            echo "当前目录内容:"
            find android/app/build/outputs -name "*.apk" -exec ls -la {} \;
            exit 1
          fi

      - name: ⬆️ Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 3  # 调试包保留3天
          if-no-files-found: error

      - name: 📝 构建报告
        run: |
          APK_SIZE=$(du -h "android/app/build/outputs/apk/debug/app-debug.apk" | cut -f1)
          
          echo "### 🧪 测试构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**构建状态:** ✅ 成功" >> $GITHUB_STEP_SUMMARY
          echo "**构建类型:** Debug (未签名)" >> $GITHUB_STEP_SUMMARY
          echo "**文件大小:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "**构建时间:** $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "**触发分支:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**提交信息:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 下载说明" >> $GITHUB_STEP_SUMMARY
          echo "1. 点击右侧的 **Artifacts** 按钮" >> $GITHUB_STEP_SUMMARY
          echo "2. 下载 **debug-app** 文件" >> $GITHUB_STEP_SUMMARY
          echo "3. 安装到测试设备即可使用" >> $GITHUB_STEP_SUMMARY

      - name: 💬 构建成功通知
        if: success()
        run: |
          echo "🎉 构建成功！Debug APK 已就绪"
          echo "📦 产物名称: debug-app"
          echo "⏰ 构建耗时: 约$(( ({{${{ job.end }}} - ${{ job.start }}) / 60000 ))分钟"