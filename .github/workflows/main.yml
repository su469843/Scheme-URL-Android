name: React Native Android Build with Secure Signing

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

env:
  # 基础配置
  NODE_VERSION: '20.19.4'
  JAVA_VERSION: '17'
  DEPLOY_BRANCH: 'dev'
  
  # Android 构建配置
  ANDROID_BUILD_TYPE: 'Release'
  ANDROID_BUILD_TIMEOUT: '45'
  GRADLE_BUILD_TIMEOUT: '30'
  
  # 签名配置 (使用 GitHub Secrets)
  KEYSTORE_FILE: 'keystore.jks'

jobs:
  Android:
    name: 🤖 Android Build (Securely Signed)
    runs-on: ubuntu-latest
    timeout-minutes: ${{ env.ANDROID_BUILD_TIMEOUT }}

    steps:
      - name: 📦 Check out repository
        uses: actions/checkout@v4

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            android/.gradle
          key: ${{ runner.os }}-android-${{ hashFiles('**/package-lock.json', '**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🔧 Setup Gradle permissions
        run: chmod +x android/gradlew

      - name: 🧹 Clean previous builds
        run: |
          cd android
          ./gradlew clean --no-daemon

      - name: 🔐 Decode Keystore from Secrets
        run: |
          cd android
          echo "🔑 Decoding keystore from GitHub Secrets..."
          
          # 将Base64编码的密钥库解码为文件:cite[4]
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ env.KEYSTORE_FILE }}
          
          # 验证密钥库文件是否成功生成
          if [ -f "${{ env.KEYSTORE_FILE }}" ]; then
            echo "✅ Keystore decoded successfully"
            echo "Key info:"
            keytool -list -v -keystore ${{ env.KEYSTORE_FILE }} -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep -E "(Alias|Valid|SHA)"
          else
            echo "❌ Failed to decode keystore"
            exit 1
          fi

      - name: 🏗️ Build with Secure Signature
        run: |
          cd android
          echo "🏗️ Building ${{ env.ANDROID_BUILD_TYPE }} APK with secure signature..."
          
          # 使用环境变量进行构建
          ./gradlew assemble${{ env.ANDROID_BUILD_TYPE }} -PkeystoreFile=${{ env.KEYSTORE_FILE }} -PkeystorePassword=${{ secrets.KEYSTORE_PASSWORD }} -PkeyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }} -PkeyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
        timeout-minutes: ${{ env.GRADLE_BUILD_TIMEOUT }}

      - name: 🧹 Cleanup keystore
        run: |
          cd android
          rm -f ${{ env.KEYSTORE_FILE }}
          echo "✅ Keystore cleaned up"

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "Current version: $PACKAGE_VERSION"

      - name: 🏷️ Create git tag
        uses: pkgdeps/git-tag-action@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repo: ${{ github.repository }}
          version: ${{ env.PACKAGE_VERSION }}
          git_tag_prefix: "v"

      - name: 📦 Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ env.ANDROID_BUILD_TYPE }}-apks
          path: |
            android/app/build/outputs/apk/${{ env.ANDROID_BUILD_TYPE }}/*.apk
          retention-days: 7

      - name: 📝 Build summary
        run: |
          echo "### 🤖 Android Build Successful (Securely Signed)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ env.PACKAGE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** ${{ env.ANDROID_BUILD_TYPE }} with Secure Signature" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ℹ️ Note:** APKs are signed with a secure certificate from GitHub Secrets." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated APKs:**" >> $GITHUB_STEP_SUMMARY
          cd android/app/build/outputs/apk/${{ env.ANDROID_BUILD_TYPE }}
          for apk in *.apk; do
            if [ -f "$apk" ]; then
              SIZE=$(du -h "$apk" | cut -f1)
              echo "- \`$apk\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
            fi
          done

  Release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: [Android]
    if: success()

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-${{ env.ANDROID_BUILD_TYPE }}-apks
          path: ./artifacts

      - name: 📊 Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: 🔍 Generate MD5 checksums
        run: |
          echo "### 📦 File Integrity Checksums" > ./release-info.md
          echo "\`\`\`" >> ./release-info.md
          cd artifacts
          md5sum *.apk >> ../release-info.md
          echo "\`\`\`" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 📝 Installation Note" >> ./release-info.md
          echo "These APKs are signed with a **secure certificate** from GitHub Secrets." >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 🔑 Signature Information" >> ./release-info.md
          echo "- **Certificate Type:** Secure (from GitHub Secrets)" >> ./release-info.md
          echo "- **Note:** Production-ready signed APKs" >> ./release-info.md
          echo "" >> ./release-info.md
          echo "### 🚀 Release Notes" >> ./release-info.md
          echo "Automated build with secure signing - $(date +'%Y-%m-%d')" >> ./release-info.md

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ./release-info.md
          prerelease: false
          draft: false
          tag_name: v${{ env.PACKAGE_VERSION }}
          files: |
            artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}