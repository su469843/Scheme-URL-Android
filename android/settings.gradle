pluginManagement {
    def developmentProjectPath = rootProject.projectDir.getParentFile().toPath().relativize(settings.gradle.toPath()).getParent().toString()
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
    }
}
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }
rootProject.name = 'schemeUrl'
include ':app'
